    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Hide any Replit-injected badge/banner completely */
      [class*="replit"],
      [id*="replit"],
      [data-replit-badge],
      script[src*="replit"] + div,
      a[href*="replit.com/site/app-page"],
      a[href*="replit.com"][target="_blank"] > span,
      div[style*="position:fixed"] a[href*="replit"],
      div[style*="position: fixed"] a[href*="replit"],
      iframe[src*="replit.com"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>
    <script>
      // Aggressively remove any Replit badge injected by the platform
      (function() {
        function removeReplitBadge() {
          // Target by class/id containing "replit"
          document.querySelectorAll('[class*="replit"],[id*="replit"],[data-replit-badge]').forEach(function(el) {
            el.remove();
          });
          // Target any fixed-position element linking to replit.com
          document.querySelectorAll('a[href*="replit.com"]').forEach(function(el) {
            var parent = el.parentElement;
            while (parent && parent !== document.body) {
              var style = window.getComputedStyle(parent);
              if (style.position === 'fixed' || style.position === 'absolute') {
                parent.remove();
                return;
              }
              parent = parent.parentElement;
            }
            el.remove();
          });
          // Target by text content
          document.querySelectorAll('div,span,a').forEach(function(el) {
            if (el.children.length === 0 && el.textContent && (
              el.textContent.includes('Made with Replit') ||
              el.textContent.includes('Build yours free') ||
              el.textContent.includes('built on Replit')
            )) {
              var toRemove = el;
              while (toRemove.parentElement && toRemove.parentElement !== document.body &&
                     toRemove.parentElement.children.length === 1) {
                toRemove = toRemove.parentElement;
              }
              toRemove.remove();
            }
          });
        }

        // Run immediately and on DOM changes
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', removeReplitBadge);
        } else {
          removeReplitBadge();
        }

        // Watch for dynamic injection
        var observer = new MutationObserver(function(mutations) {
          var needsCheck = false;
          mutations.forEach(function(m) {
            if (m.addedNodes.length > 0) needsCheck = true;
          });
          if (needsCheck) removeReplitBadge();
        });

        document.addEventListener('DOMContentLoaded', function() {
          observer.observe(document.body, { childList: true, subtree: true });
          removeReplitBadge();
        });

        // Also run after full page load
        window.addEventListener('load', removeReplitBadge);
        // And periodically for the first 10 seconds
        var attempts = 0;
        var interval = setInterval(function() {
          removeReplitBadge();
          attempts++;
          if (attempts >= 20) clearInterval(interval);
        }, 500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
